name: "Run GUT Unit Tests"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  run-tests:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y libfontconfig1

      - name: "Create Godot Editor Settings and Import Assets"
        run: |
          mkdir -p ~/.config/godot

          set +e

          godot \
            --headless \
            --editor \
            --quit \
            2>&1 | tee godot.log
            
          if grep -E "SCRIPT ERROR|Parse Error|Could not find base class|Compilation failed" godot.log; then
            echo "::error::Godot compilation failed"
            exit 1
          fi

          exit 0

      - name: "Run GUT Test Suite"
        run: |
          set +e

          godot \
            --headless \
            -s addons/gut/gut_cmdln.gd \
            -gdir=res://tests \
            -ginclude_subdirs \
            -glog=2 \
            -gexit \
            2>&1 | tee gut.log

          sed \
            -e '/GDExtension dynamic library not found/d' \
            -e '/Error loading extension/d' \
            -e '/open_dynamic_library/d' \
            -e '/FileAccess::exists(path)/d' \
            gut.log > gut.filtered.log

          if grep -i -E "SCRIPT ERROR|FAILED|ERROR|NOT OK|ORPHANED|CRASHED|INVALID" gut.filtered.log; then
            echo "::error::GUT tests failed"
            exit 1
          fi

          exit 0